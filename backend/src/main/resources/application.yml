server:
  port: 8080

spring:
  application:
    name: backend
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      api-key: ${GEMINI_API_KEY}
      chat:
        options:
          model: ${AI_EXTRACTION_MODEL:gemini-flash-latest}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:gemini-embedding-001}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

ai:
  extraction:
    active-provider: ${AI_EXTRACTION_PROVIDER:gemini}
    model: ${AI_EXTRACTION_MODEL:gemini-flash-latest}
    prompt-version: ${AI_EXTRACTION_PROMPT_VERSION:cv_extract_v3}
    fallback-model: ${AI_EXTRACTION_FALLBACK_MODEL:gemini-flash-lite-latest}
    temperature: ${AI_EXTRACTION_TEMPERATURE:0.1}
    max-tokens: ${AI_EXTRACTION_MAX_TOKENS:4096}
    retries: ${AI_EXTRACTION_RETRIES:2}
    timeout-ms: ${AI_EXTRACTION_TIMEOUT_MS:20000}
  embedding:
    active-provider: ${AI_EMBEDDING_PROVIDER:gemini}
    model: ${AI_EMBEDDING_MODEL:gemini-embedding-001}
    dimensions: ${AI_EMBEDDING_DIMENSIONS:768}
    batch-size: ${AI_EMBEDDING_BATCH_SIZE:1}
    chunk-token-size: ${AI_EMBEDDING_CHUNK_TOKEN_SIZE:500}
    chunk-token-overlap: ${AI_EMBEDDING_CHUNK_TOKEN_OVERLAP:50}
    retries: ${AI_EMBEDDING_RETRIES:2}
    timeout-ms: ${AI_EMBEDDING_TIMEOUT_MS:20000}
    max-characters-per-input: ${AI_EMBEDDING_MAX_CHARACTERS_PER_INPUT:8000}
  prompts:
    active-version: ${AI_PROMPT_VERSION:cv_extract_v3}


jwt:
  signerKey: ${SIGNER_KEY}
